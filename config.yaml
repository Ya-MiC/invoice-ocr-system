# OCR配置
ocr:
  engine: "rapidocr"
  model_dir: "./models"
  languages: ["ch", "en"]

# 定时检测配置
scheduler:
  scan_interval: 30
  input_dir: "./input"
  processed_dir: "./processed"
  failed_dir: "./failed"

# 重试配置
retry:
  max_attempts: 3
  backoff_factor: 2
  initial_delay: 5

# 输出配置
output:
  format: "csv"
  csv_path: "./output/invoices.csv"
  sqlite_path: "./output/invoices.db"

# 资源监控阈值
monitoring:
  cpu_threshold: 80
  memory_threshold: 80
  gpu_threshold: 90
  check_interval: 60

# 服务配置
server:
  host: "0.0.0.0"
  port: 8080
  workers: 1
